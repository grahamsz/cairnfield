name: Android

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build And Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - name: Check Out
        uses: actions/checkout@v5

      - name: Set Up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set Up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Unit Tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: cairnfield-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Set Release Version
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          echo "CAIRNFIELD_ANDROID_VERSION_NAME=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          echo "CAIRNFIELD_ANDROID_VERSION_CODE=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Decode Release Keystore
        if: github.ref_type == 'tag'
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/cairnfield-release.jks"
          echo "CAIRNFIELD_KEYSTORE_FILE=$RUNNER_TEMP/cairnfield-release.jks" >> "$GITHUB_ENV"

      - name: Build Signed Release APK
        if: github.ref_type == 'tag'
        env:
          CAIRNFIELD_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          CAIRNFIELD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          CAIRNFIELD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew :app:assembleRelease
          cp app/build/outputs/apk/release/app-release.apk "$RUNNER_TEMP/cairnfield-android.apk"

      - name: Publish APK To GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/cairnfield-android.apk
