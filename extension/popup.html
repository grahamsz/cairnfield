<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Clip to Cairnfield</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="popup">
    <main>
      <h1>Clip to Cairnfield</h1>
      <label>Destination<select id="destination"></select></label>
      <div class="actions">
        <button id="clip-pdf" type="button">
          <span class="icon pdf" aria-hidden="true"></span>
          <span>Clip page as PDF</span>
        </button>
        <button id="clip-html" type="button" class="secondary">
          <span class="icon html" aria-hidden="true"></span>
          <span>Clip page as HTML</span>
        </button>
        <button id="clip-selection-image" type="button" class="secondary">
          <span class="icon image" aria-hidden="true"></span>
          <span>Clip selection as image</span>
        </button>
        <button id="clip-selection" type="button" class="secondary">
          <span class="icon text" aria-hidden="true"></span>
          <span>Clip selection as HTML</span>
        </button>
      </div>
      <button id="options" type="button" class="link">Options</button>
      <p id="status" role="status"></p>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
